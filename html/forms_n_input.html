<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <h1>Welcome to the page!</h1>
</head>
<body>
    <form> 

        <!-- inputting raw text  -->
        <label>Name</label> 
        <input type ="text"/>

        <!-- inputting email address at the rate is must -->
        <label>Email</label>
        <input type="email"/>
         
        <!-- inputting passwords  everything is hidden here-->
        <label>Password</label>
        <input type="password"/> 

        <!--submitting inputted data through the following-->
        <input type="submit"/>

        <!-- hold control and space here to see various other types of inputs-->
        <input type="button"/>
        <label for="Dowload"></label>
        <input type="download"/>
        <input type="checkbox"/>
        <input type="color"/>

        <input type="date"/>

        <!-- only files can go in -->
        <input type="file">

        <!-- only numbers can go in -->
        <input type="number">

        <input type="range">

        <input type="reset">


          
    </form>
</body>
</html>
